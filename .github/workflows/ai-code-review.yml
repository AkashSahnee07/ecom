name: Claude AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Claude Code Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request for a Java Spring Boot microservices e-commerce platform.
            Focus on:
            - Code quality, best practices, and adherence to Spring Boot conventions
            - Potential bugs, null pointer risks, and edge cases
            - Security vulnerabilities (SQL injection, XSS, authentication/authorization issues)
            - Performance concerns (N+1 queries, missing indexes, inefficient algorithms)
            - Kafka producer/consumer configuration correctness
            - Proper error handling and exception management
            - REST API design consistency
