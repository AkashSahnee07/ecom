name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B verify -DskipTests --file pom.xml

  lint:
    name: Checkstyle Lint
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Run Checkstyle
      run: mvn -B checkstyle:check --file pom.xml

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ecommerce
          POSTGRES_USER: ecommerce
          POSTGRES_PASSWORD: ecommerce123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ecommerce"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: product_db
          MYSQL_USER: product_user
          MYSQL_PASSWORD: product123
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mongodb:
        image: mongo:7.0
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: admin123
          MONGO_INITDB_DATABASE: recommendation_db
        ports:
          - 27017:27017

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Create PostgreSQL databases
      env:
        PGPASSWORD: ecommerce123
      run: |
        psql -h localhost -U ecommerce -d ecommerce -c "CREATE DATABASE user_db;" || true
        psql -h localhost -U ecommerce -d ecommerce -c "CREATE DATABASE order_db;" || true
        psql -h localhost -U ecommerce -d ecommerce -c "CREATE DATABASE payment_db;" || true
        psql -h localhost -U ecommerce -d ecommerce -c "CREATE DATABASE inventory_db;" || true
        psql -h localhost -U ecommerce -d ecommerce -c "CREATE DATABASE shipping_db;" || true
        psql -h localhost -U ecommerce -d ecommerce -c "CREATE DATABASE review_db;" || true
        psql -h localhost -U ecommerce -d ecommerce -c "CREATE DATABASE recommendation_db;" || true

    - name: Run tests with coverage
      run: mvn -B test jacoco:report --file pom.xml -Dspring.profiles.active=test
      continue-on-error: true

    - name: Generate coverage report
      run: mvn -B jacoco:report --file pom.xml -Dspring.profiles.active=test
      continue-on-error: true

    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-reports
        path: '**/target/site/jacoco/'
        retention-days: 14

    - name: Print coverage summary
      if: always()
      run: |
        echo "=== Test Coverage Summary ==="
        for dir in */target/site/jacoco/index.html; do
          if [ -f "$dir" ]; then
            service=$(echo "$dir" | cut -d'/' -f1)
            echo "Coverage report generated for: $service"
          fi
        done
