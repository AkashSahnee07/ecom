# Optional admin UIs — enable with: docker compose --profile tools up -d

services:
  pgadmin:
    profiles: [tools]
    image: dpage/pgadmin4:latest
    container_name: ecom-pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@ecommerce.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - ecom-network
    restart: unless-stopped

  mongo-express:
    profiles: [tools]
    image: mongo-express:latest
    container_name: ecom-mongo-express
    ports:
      - "${MONGO_EXPRESS_PORT:-8091}:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-admin123}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-admin123}@mongodb:27017/
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ecom-network
    restart: unless-stopped

networks:
  ecom-network:
    name: ecom-network

volumes:
  pgadmin_data:
