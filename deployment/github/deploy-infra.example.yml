# Example CI/CD workflow — copy to .github/workflows/deploy-infra.yml

name: Deploy Infrastructure (Example)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'deployment/**'

jobs:
  validate-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker Compose files
        run: |
          docker compose -f deployment/docker/docker-compose.infra.yml config --quiet
          docker compose -f deployment/docker/docker-compose.observability.yml config --quiet

  build-service-image:
    runs-on: ubuntu-latest
    needs: validate-compose
    strategy:
      matrix:
        service:
          - api-gateway
          - user-service
          - cart-service
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        run: |
          ./deployment/scripts/build-service-image.sh ${{ matrix.service }} ${{ github.sha }}

  # Add push-to-registry and kubectl rollout steps for your environment
