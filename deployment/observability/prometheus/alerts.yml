groups:
  - name: ecommerce-alerts
    rules:
      - alert: ServiceDown
        expr: up{job="ecommerce-platform"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.instance }} is down"
          description: "Prometheus cannot scrape {{ $labels.instance }} for more than 2 minutes."

      - alert: HighErrorRate
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) by (application)
          /
          sum(rate(http_server_requests_seconds_count[5m])) by (application) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate on {{ $labels.application }}"

      - alert: AuthFailureSpike
        expr: increase(auth_jwt_validation_total{result="failure"}[5m]) > 50
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "JWT validation failures spiking on {{ $labels.layer }}"

      - alert: HighLatencyP99
        expr: histogram_quantile(0.99, sum(rate(http_server_requests_seconds_bucket[5m])) by (le, application)) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P99 latency above 2s for {{ $labels.application }}"
