version: '3.8'

services:
  # Zipkin Server for Distributed Tracing
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: ecom-zipkin
    ports:
      - "9411:9411"
    environment:
      # Storage configuration
      - STORAGE_TYPE=mem
      # Uncomment below for MySQL storage
      # - STORAGE_TYPE=mysql
      # - MYSQL_HOST=mysql
      # - MYSQL_TCP_PORT=3306
      # - MYSQL_DB=zipkin
      # - MYSQL_USER=zipkin
      # - MYSQL_PASS=zipkin
      
      # Uncomment below for Elasticsearch storage
      # - STORAGE_TYPE=elasticsearch
      # - ES_HOSTS=elasticsearch:9200
      
      # JVM settings
      - JAVA_OPTS=-Xms512m -Xmx1024m
      
      # Logging
      - LOGGING_LEVEL_ROOT=INFO
      
    networks:
      - ecom-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9411/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Zipkin Dependencies (for service dependency visualization)
  zipkin-dependencies:
    image: openzipkin/zipkin-dependencies:latest
    container_name: ecom-zipkin-dependencies
    environment:
      - STORAGE_TYPE=mem
      - ZIPKIN_BASE_URL=http://zipkin:9411
    depends_on:
      - zipkin
    networks:
      - ecom-network
    restart: "no"
    # Run daily at 2 AM
    command: >
      sh -c "while true; do
        echo 'Running Zipkin Dependencies analysis...'
        java -jar zipkin-dependencies.jar
        echo 'Zipkin Dependencies analysis completed. Sleeping for 24 hours...'
        sleep 86400
      done"

  # Optional: MySQL for Zipkin storage (uncomment if needed)
  # zipkin-mysql:
  #   image: mysql:8.0
  #   container_name: ecom-zipkin-mysql
  #   environment:
  #     - MYSQL_ROOT_PASSWORD=rootpassword
  #     - MYSQL_DATABASE=zipkin
  #     - MYSQL_USER=zipkin
  #     - MYSQL_PASSWORD=zipkin
  #   ports:
  #     - "3307:3306"
  #   volumes:
  #     - zipkin_mysql_data:/var/lib/mysql
  #     - ./scripts/zipkin-mysql-init.sql:/docker-entrypoint-initdb.d/init.sql
  #   networks:
  #     - ecom-network
  #   restart: unless-stopped

  # Optional: Elasticsearch for Zipkin storage (uncomment if needed)
  # zipkin-elasticsearch:
  #   image: docker.elastic.co/elasticsearch/elasticsearch:7.17.0
  #   container_name: ecom-zipkin-elasticsearch
  #   environment:
  #     - discovery.type=single-node
  #     - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
  #     - xpack.security.enabled=false
  #   ports:
  #     - "9200:9200"
  #   volumes:
  #     - zipkin_es_data:/usr/share/elasticsearch/data
  #   networks:
  #     - ecom-network
  #   restart: unless-stopped

  # Kafka for distributed tracing (if using Kafka as transport)
  kafka-zipkin:
    image: confluentinc/cp-kafka:latest
    container_name: ecom-kafka-zipkin
    depends_on:
      - zookeeper-zipkin
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-zipkin:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      # Zipkin-specific topics
      KAFKA_CREATE_TOPICS: "zipkin:1:1"
    networks:
      - ecom-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Zookeeper for Kafka
  zookeeper-zipkin:
    image: confluentinc/cp-zookeeper:latest
    container_name: ecom-zookeeper-zipkin
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ecom-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Jaeger (Alternative to Zipkin - uncomment if preferred)
  # jaeger:
  #   image: jaegertracing/all-in-one:latest
  #   container_name: ecom-jaeger
  #   ports:
  #     - "16686:16686"  # Jaeger UI
  #     - "14268:14268"  # HTTP collector
  #     - "14250:14250"  # gRPC collector
  #   environment:
  #     - COLLECTOR_ZIPKIN_HOST_PORT=:9411
  #   networks:
  #     - ecom-network
  #   restart: unless-stopped

networks:
  ecom-network:
    driver: bridge
    name: ecom-network

volumes:
  # Uncomment if using MySQL storage
  # zipkin_mysql_data:
  #   driver: local
  
  # Uncomment if using Elasticsearch storage
  # zipkin_es_data:
  #   driver: local