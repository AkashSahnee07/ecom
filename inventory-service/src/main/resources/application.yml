server:
  port: 8086

spring:
  application:
    name: inventory-service
  
  datasource:
    url: jdbc:postgresql://localhost:5432/inventory_db
    username: ${DB_USERNAME:ecommerce}
    password: ${DB_PASSWORD:ecommerce123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      leak-detection-threshold: 60000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
    open-in-view: false
  
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      batch-size: 16384
      linger-ms: 1
      buffer-memory: 33554432
  
  cloud:
    config:
      uri: http://localhost:8888
      fail-fast: true
      retry:
        initial-interval: 1000
        max-attempts: 6
        max-interval: 2000
        multiplier: 1.1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90
    metadata-map:
      version: 1.0
      environment: dev

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    com.ecommerce.inventory: DEBUG
    org.springframework.kafka: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/inventory-service.log

# Custom application properties
app:
  kafka:
    topics:
      inventory-events: inventory-events
      reorder-events: reorder-events
      stock-alerts: stock-alerts
  
  inventory:
    default-minimum-stock: 10
    default-reorder-point: 20
    default-reorder-quantity: 100
    low-stock-threshold-percentage: 20
    overstock-threshold-percentage: 90
    stock-check-interval: 3600000 # 1 hour in milliseconds
  
  warehouse:
    default-warehouse-id: WH001
    supported-warehouses:
      - WH001
      - WH002
      - WH003
  
  security:
    jwt:
      secret: mySecretKey
      expiration: 86400000 # 24 hours
  
  external:
    product-service:
      url: http://localhost:8082
      timeout: 5000
    order-service:
      url: http://localhost:8085
      timeout: 5000

springdoc:
  api-docs:
    path: /inventory/v3/api-docs
  swagger-ui:
    path: /inventory/swagger-ui.html
