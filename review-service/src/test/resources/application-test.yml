# Test Configuration for Review Service
spring:
  application:
    name: review-service-test
  config:
    import: "optional:configserver:"

  # In-memory H2 Database for testing
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # H2 Console (useful for debugging tests)
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA Configuration for tests
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        generate_statistics: false
        cache:
          use_second_level_cache: false
          use_query_cache: false

  # Kafka - use localhost placeholder (overridden by @EmbeddedKafka)
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: review-service-test-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "*"

  # Disable file upload in tests
  servlet:
    multipart:
      enabled: false

  # Simple cache for tests
  cache:
    type: simple

# Test server configuration
server:
  port: 0

# Disable Eureka in tests
eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

# Disable management endpoints in tests
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  tracing:
    enabled: false

# Test logging configuration
logging:
  level:
    com.ecommerce.review: DEBUG
    org.springframework.kafka: WARN
    org.hibernate.SQL: DEBUG
    org.springframework.web: INFO
    org.springframework.test: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Test-specific application properties
app:
  review:
    image:
      upload-dir: ./test-uploads
      max-size: 1MB
      allowed-types: jpg,png
      thumbnail-size: 100
      max-images-per-review: 3
    moderation:
      auto-approve-threshold: 0.1
      spam-threshold: 0.9
      profanity-filter-enabled: false
      require-manual-review: false
      max-pending-reviews: 100
    rating:
      min-rating: 1
      max-rating: 5
      allow-half-ratings: true
      require-purchase-verification: false
    notification:
      enabled: false
    analytics:
      enabled: false
      batch-size: 10
      processing-interval: 1000
      retention-days: 1
    cache:
      review-ttl: 60
      stats-ttl: 30
      featured-ttl: 120
    security:
      rate-limit:
        enabled: false
      require-authentication: false